<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LevelFeed Dashboard</title>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2a2a32;
    --text: #e8e6f0;
    --muted: #7a7890;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --green: #4ade80;
    --amber: #fbbf24;
    --blue: #60a5fa;
    --pink: #f472b6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -.5px; }
  .logo span { color: var(--accent); }
  .header-meta { font-size: 12px; color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .btn-refresh { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-refresh:hover { opacity: .85; }

  /* STATS BAR */
  .stats { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
  .stat { flex: 1; padding: 12px 20px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-val { font-size: 22px; font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* FILTERS */
  .filters { padding: 12px 20px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 53px; z-index: 99; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .search-wrap { margin-left: auto; }
  .search-wrap input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 20px; font-size: 12px; width: 200px; }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }

  /* MAIN LAYOUT */
  .main { display: grid; grid-template-columns: 1fr 340px; min-height: calc(100vh - 130px); }

  /* NEWS LIST */
  .news-list { border-right: 1px solid var(--border); }
  .news-item { padding: 16px 20px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start; transition: background .1s; }
  .news-item:hover { background: var(--surface); }
  .news-item.published { opacity: .4; }
  .news-item.ignored { display: none; }
  .item-source { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px; border-radius: 10px; display: inline-block; margin-bottom: 6px; }
  .item-title { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 5px; }
  .item-title a { color: var(--text); text-decoration: none; }
  .item-title a:hover { color: var(--accent); }
  .item-summary { font-size: 12px; color: var(--muted); line-height: 1.55; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .item-meta { font-size: 11px; color: var(--muted); display: flex; gap: 10px; align-items: center; }
  .hype-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; }
  .item-actions { display: flex; flex-direction: column; gap: 6px; min-width: 90px; }
  .btn-publish { background: var(--accent); color: #fff; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; width: 100%; }
  .btn-publish:hover { opacity: .85; }
  .btn-ignore { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; width: 100%; }
  .btn-ignore:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-save { background: var(--surface2); color: var(--amber); border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; width: 100%; }
  .no-items { padding: 60px 20px; text-align: center; color: var(--muted); }

  /* SIDEBAR — Draft Panel */
  .sidebar { padding: 20px; }
  .sidebar-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }
  .draft-panel { display: none; }
  .draft-panel.visible { display: block; }
  .draft-game { font-size: 16px; font-weight: 700; margin-bottom: 14px; line-height: 1.3; }
  .draft-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; margin-top: 14px; }
  .draft-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--text); line-height: 1.6; white-space: pre-wrap; min-height: 80px; }
  .char-count { font-size: 11px; color: var(--muted); text-align: right; margin-top: 4px; }
  .btn-copy { width: 100%; margin-top: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-copy:hover { border-color: var(--accent); }
  .btn-copy.copied { background: var(--green); color: #000; border-color: var(--green); }
  .signal-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .signal-item { font-size: 12px; color: var(--green); padding: 3px 0; display: flex; align-items: center; gap: 6px; }
  .signal-item::before { content: '↑'; font-size: 10px; }
  .empty-draft { text-align: center; padding: 40px 0; color: var(--muted); font-size: 13px; }

  /* CATEGORY COLORS */
  .cat-general    { background: #1e3a5f; color: var(--blue); }
  .cat-publishers { background: #3b1f4f; color: #c084fc; }
  .cat-nintendo   { background: #4f1f1f; color: var(--accent2); }
  .cat-xbox       { background: #1f3f2a; color: var(--green); }
  .cat-playstation{ background: #1f2f4f; color: var(--blue); }
  .cat-hardware   { background: #2f2f1f; color: var(--amber); }
  .cat-esports    { background: #3f1f2f; color: var(--pink); }
  .cat-youtube    { background: #4f1f1f; color: var(--accent2); }
  .cat-indie      { background: #1f3f3f; color: #34d399; }

  /* LOADING */
  .loading { text-align: center; padding: 60px; color: var(--muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .stats { flex-wrap: wrap; }
    .stat { min-width: 50%; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Level<span>Feed</span> <span style="font-size:12px;color:var(--muted);font-weight:400">Dashboard</span></div>
  <div class="header-right">
    <div class="header-meta" id="last-updated">Loading...</div>
    <button class="btn-refresh" onclick="loadData()">Refresh</button>
  </div>
</div>

<div class="stats" id="stats-bar">
  <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Total items</div></div>
  <div class="stat"><div class="stat-val" id="s-new" style="color:var(--green)">—</div><div class="stat-lbl">New this run</div></div>
  <div class="stat"><div class="stat-val" id="s-hot" style="color:var(--amber)">—</div><div class="stat-lbl">Hot indie (≥6)</div></div>
  <div class="stat"><div class="stat-val" id="s-published" style="color:var(--accent)">—</div><div class="stat-lbl">Published</div></div>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" data-filter="general"     onclick="setFilter('general',this)">General</button>
  <button class="filter-btn" data-filter="nintendo"    onclick="setFilter('nintendo',this)">Nintendo</button>
  <button class="filter-btn" data-filter="xbox"        onclick="setFilter('xbox',this)">Xbox</button>
  <button class="filter-btn" data-filter="playstation" onclick="setFilter('playstation',this)">PlayStation</button>
  <button class="filter-btn" data-filter="hardware"    onclick="setFilter('hardware',this)">PC/Nvidia</button>
  <button class="filter-btn" data-filter="esports"     onclick="setFilter('esports',this)">eSports</button>
  <button class="filter-btn" data-filter="indie"       onclick="setFilter('indie',this)" style="color:#34d399;border-color:#34d39940">Indie Radar</button>
  <div class="search-wrap"><input type="text" id="search" placeholder="Search..." oninput="applyFilters()"></div>
</div>

<div class="main">
  <div class="news-list" id="news-list">
    <div class="loading"><div class="spinner"></div><br>Loading news...</div>
  </div>
  <div class="sidebar">
    <div class="sidebar-title">Draft post</div>
    <div id="empty-draft" class="empty-draft">Click "Draft" on any story to generate Twitter + Instagram copy.</div>
    <div class="draft-panel" id="draft-panel">
      <div class="draft-game" id="draft-title"></div>
      <div id="draft-signals"></div>
      <div class="draft-label">Twitter / X</div>
      <div class="draft-box" id="draft-twitter" contenteditable="true"></div>
      <div class="char-count" id="tw-count">0 / 280</div>
      <button class="btn-copy" onclick="copy('draft-twitter','tw-btn')" id="tw-btn">Copy Twitter</button>
      <div class="draft-label">Instagram</div>
      <div class="draft-box" id="draft-instagram" contenteditable="true"></div>
      <button class="btn-copy" onclick="copy('draft-instagram','ig-btn')" id="ig-btn">Copy Instagram</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────
let allItems = [];
let publishedIds = new Set(JSON.parse(localStorage.getItem('published') || '[]'));
let ignoredIds   = new Set(JSON.parse(localStorage.getItem('ignored')   || '[]'));
let savedIds     = new Set(JSON.parse(localStorage.getItem('saved')     || '[]'));
let currentFilter = 'all';
let publishedCount = publishedIds.size;

// ── Load data ─────────────────────────
async function loadData() {
  document.getElementById('news-list').innerHTML =
    '<div class="loading"><div class="spinner"></div><br>Fetching latest news...</div>';
  try {
    const [r1, r2] = await Promise.all([
      fetch('data/news_bot1.json?t=' + Date.now()).catch(() => ({ok:false})),
      fetch('data/news_bot2.json?t=' + Date.now()).catch(() => ({ok:false})),
    ]);
    let items = [];
    let newCount = 0, hotCount = 0, lastUpdated = '';

    if (r1.ok) {
      const d1 = await r1.json();
      items = items.concat(d1.items || []);
      newCount += d1.new_this_run || 0;
      lastUpdated = d1.last_updated || '';
    }
    if (r2.ok) {
      const d2 = await r2.json();
      const radar = (d2.items || []).map(i => ({...i, category:'indie'}));
      items = items.concat(radar);
      hotCount = d2.hot_count || 0;
    }

    // Sort by date desc
    items.sort((a,b) => new Date(b.date||b.fetched) - new Date(a.date||a.fetched));
    allItems = items;

    // Stats
    document.getElementById('s-total').textContent = items.length;
    document.getElementById('s-new').textContent   = newCount;
    document.getElementById('s-hot').textContent   = hotCount;
    document.getElementById('s-published').textContent = publishedIds.size;
    if (lastUpdated) {
      const d = new Date(lastUpdated);
      document.getElementById('last-updated').textContent =
        'Updated ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    }
    applyFilters();
  } catch(e) {
    document.getElementById('news-list').innerHTML =
      '<div class="no-items">Could not load data files.<br>Make sure the bots have run at least once.<br><br><small style="color:#555">Expected: data/news_bot1.json and data/news_bot2.json</small></div>';
  }
}

// ── Filter & render ───────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase();
  let filtered = allItems.filter(item => {
    if (ignoredIds.has(item.id)) return false;
    if (currentFilter !== 'all' && item.category !== currentFilter) return false;
    if (query && !item.title.toLowerCase().includes(query) &&
        !(item.summary||'').toLowerCase().includes(query)) return false;
    return true;
  });
  renderList(filtered);
}

function renderList(items) {
  const list = document.getElementById('news-list');
  if (!items.length) {
    list.innerHTML = '<div class="no-items">No items match this filter.</div>';
    return;
  }
  list.innerHTML = items.map(item => {
    const pub  = publishedIds.has(item.id);
    const saved= savedIds.has(item.id);
    const hype = item.hype_score;
    const dateStr = item.date ? new Date(item.date).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';

    const hypeBadge = hype >= 1
      ? `<span class="hype-badge" style="color:${hype>=7?'#fbbf24':hype>=4?'#34d399':'#6b7280'}">
           ${hype>=7?'🔥':hype>=4?'↑':''} Hype ${hype}/10
         </span>`
      : '';

    return `
    <div class="news-item ${pub?'published':''}" id="item-${item.id}">
      <div>
        <span class="item-source cat-${item.category}">${item.source}</span>
        <div class="item-title"><a href="${item.link}" target="_blank" rel="noopener">${escHtml(item.title)}</a></div>
        ${item.summary ? `<div class="item-summary">${escHtml(item.summary)}</div>` : ''}
        <div class="item-meta">
          <span>${dateStr}</span>
          ${hypeBadge}
          ${item.signals?.length ? `<span style="color:#34d399;font-size:11px">${item.signals.slice(0,2).join(' · ')}</span>` : ''}
        </div>
      </div>
      <div class="item-actions">
        <button class="btn-publish" onclick="openDraft('${item.id}')">${pub?'✓ Done':'Draft'}</button>
        <button class="btn-save ${saved?'copied':''}" onclick="toggleSave('${item.id}',this)">${saved?'Saved':'Save'}</button>
        <button class="btn-ignore" onclick="ignore('${item.id}')">Ignore</button>
      </div>
    </div>`;
  }).join('');

  // Update char count on edit
  document.getElementById('draft-twitter')?.addEventListener('input', updateTwCount);
}

// ── Actions ───────────────────────────
function markPublished(id) {
  publishedIds.add(id);
  localStorage.setItem('published', JSON.stringify([...publishedIds]));
  document.getElementById('s-published').textContent = publishedIds.size;
  const el = document.getElementById('item-'+id);
  if (el) el.classList.add('published');
  const btn = el?.querySelector('.btn-publish');
  if (btn) btn.textContent = '✓ Done';
}

function ignore(id) {
  ignoredIds.add(id);
  localStorage.setItem('ignored', JSON.stringify([...ignoredIds]));
  const el = document.getElementById('item-'+id);
  if (el) { el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }
}

function toggleSave(id, btn) {
  if (savedIds.has(id)) {
    savedIds.delete(id);
    btn.textContent = 'Save';
    btn.classList.remove('copied');
  } else {
    savedIds.add(id);
    btn.textContent = 'Saved';
    btn.classList.add('copied');
  }
  localStorage.setItem('saved', JSON.stringify([...savedIds]));
}

// ── Draft generator ───────────────────
function openDraft(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;

  document.getElementById('empty-draft').style.display = 'none';
  document.getElementById('draft-panel').classList.add('visible');
  document.getElementById('draft-title').textContent = item.title;

  // Signals
  const sigEl = document.getElementById('draft-signals');
  if (item.signals?.length) {
    sigEl.innerHTML = '<div class="signal-list">' +
      item.signals.map(s=>`<div class="signal-item">${s}</div>`).join('') +
      '</div>';
  } else { sigEl.innerHTML = ''; }

  // Twitter draft
  const cat = item.category;
  let tw = '';
  if (cat === 'indie') {
    tw = `🎮 Indie Radar: "${item.title}" is showing early hype signals.\n\n${item.hype_score >= 7 ? '🔥 High buzz — one to watch before it blows up.' : '↑ Gaining traction across gaming communities.'}\n\n${item.link}`;
  } else if (cat === 'hardware') {
    tw = `💻 ${item.source}: ${item.title}\n\n${item.summary ? item.summary.slice(0,120)+'...' : ''}\n\n${item.link}`;
  } else if (cat === 'esports') {
    tw = `🏆 Esports: ${item.title}\n\n${item.link}`;
  } else if (cat === 'youtube') {
    tw = `🎬 New video from ${item.source}:\n"${item.title}"\n\n${item.link}`;
  } else {
    tw = `🕹️ ${item.title}\n\n${item.summary ? item.summary.slice(0,120)+'...\n\n' : ''}${item.link}`;
  }
  tw = tw.trim().slice(0,280);

  // Instagram draft
  let ig = '';
  if (cat === 'indie') {
    ig = `🎮 INDIE RADAR\n\n"${item.title}" is showing early hype signals before mainstream press picks it up.\n\n${item.signals?.length ? item.signals.join('\n') + '\n\n' : ''}Could be the next big indie hit. Follow @LevelFeed to catch these before they blow up. 👾\n\n#indiegames #indiegaming #gamedev #gaming #levelfeed`;
  } else if (cat === 'esports') {
    ig = `🏆 ESPORTS UPDATE\n\n${item.title}\n\nFollow @LevelFeed for daily esports and gaming news.\n\n#esports #gaming #competitivegaming #levelfeed`;
  } else if (cat === 'hardware') {
    ig = `💻 PC GAMING & HARDWARE\n\n${item.title}\n\n${item.summary ? item.summary.slice(0,200) + '\n\n' : ''}Follow @LevelFeed for gaming hardware news.\n\n#pcgaming #nvidia #gaming #hardware #levelfeed`;
  } else {
    ig = `🕹️ GAMING NEWS\n\n${item.title}\n\n${item.summary ? item.summary.slice(0,200) + '\n\n' : ''}Follow @LevelFeed for daily gaming news — fast.\n\n#gaming #gamingnews #videogames #levelfeed`;
  }

  document.getElementById('draft-twitter').textContent   = tw;
  document.getElementById('draft-instagram').textContent = ig;
  updateTwCount();

  // Mark as published when draft is opened
  markPublished(id);

  // Scroll sidebar into view on mobile
  document.querySelector('.sidebar')?.scrollIntoView({behavior:'smooth'});
}

function updateTwCount() {
  const len = document.getElementById('draft-twitter')?.textContent.length || 0;
  const el  = document.getElementById('tw-count');
  if (el) { el.textContent = len + ' / 280'; el.style.color = len > 280 ? '#ff6b6b' : '#7a7890'; }
}

function copy(elId, btnId) {
  const text = document.getElementById(elId)?.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────
loadData();
</script>
</body>
</html>
